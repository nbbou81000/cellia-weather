name: Fetch Weather Data

on:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Netatmo data
        env:
          NETATMO_CLIENT_ID:     ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
          LOCATION_LAT:          ${{ secrets.LOCATION_LAT }}
          LOCATION_LON:          ${{ secrets.LOCATION_LON }}
        run: node scripts/fetch-weather.js

      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather-data.json history-index.json history-*.json trmnl-feed.json
          git diff --staged --quiet || git commit -m "chore: update weather data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
